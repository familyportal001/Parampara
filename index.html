<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a0f00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Parampara" />

  <title>Parampara</title>
  <link rel="manifest" href="./manifest.json" />

  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />

  <style>
    :root {
      --night:#0f0800;
      --bark:#1e1005;
      --clay:#4a2e10;
      --gold:#c8893a;
      --gold2:#e0aa5a;
      --cream:#f5ead8;
      --ink:#1e1005;
      --r:5px;
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--night);
      color:var(--cream);
      font-family:'DM Sans', sans-serif;
    }

    .screen {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:var(--night);
    }

    .hide {
      display:none !important;
    }

    .brand {
      font-family:'Crimson Pro', serif;
      font-size:48px;
      color:var(--gold);
      letter-spacing:.06em;
    }

    #app {
      position:fixed;
      inset:0;
      display:none;
      flex-direction:column;
    }

    #app.show {
      display:flex;
    }

    header {
      height:52px;
      display:flex;
      align-items:center;
      padding:0 12px;
      gap:8px;
      background:var(--bark);
      border-bottom:1px solid var(--clay);
    }

    .logo {
      flex:1;
      font-family:'Crimson Pro', serif;
      color:var(--gold);
      font-size:22px;
    }

    button {
      background:none;
      border:1px solid rgba(200,137,58,.3);
      color:var(--gold);
      padding:6px 10px;
      border-radius:var(--r);
      cursor:pointer;
      font-size:12px;
    }

    button.primary {
      background:var(--gold);
      color:var(--ink);
    }

    #canvas-wrap {
      flex:1;
      overflow:hidden;
      position:relative;
    }

    #world {
      position:absolute;
      top:0;
      left:0;
    }

    .card {
      position:absolute;
      width:150px;
      background:var(--bark);
      border:1.5px solid var(--clay);
      border-radius:var(--r);
      padding:10px;
      text-align:center;
      cursor:pointer;
    }

    .card.path-highlight {
      border-color:var(--gold2);
      background:var(--clay);
      box-shadow:0 0 10px var(--gold);
    }

    #toast {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:var(--bark);
      color:var(--gold2);
      padding:8px 16px;
      border-radius:var(--r);
      display:none;
    }

    #toast.show {
      display:block;
    }
  </style>
</head>

<body>

<div id="s-lang" class="screen">
  <div class="brand">Parampara</div>
  <button class="primary" style="margin-top:20px; padding:10px 20px;"
          onclick="initApp()">Enter Tree</button>
</div>

<div id="app">
  <header>
    <div class="logo">Parampara</div>
    <button onclick="initPathMode()">Find Path</button>
    <button class="primary" onclick="shareFamily()">Invite</button>
  </header>

  <div id="canvas-wrap">
    <div id="world">
      <div id="nodes-layer"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const el = id => document.getElementById(id);

  let members = [];
  let isPathMode = false;
  let pathSelection = [];

  function getDemoData() {
    return [
      { id:'1', name:'Grandpa', x:100, y:50, partners:['2'] },
      { id:'2', name:'Grandma', x:280, y:50, partners:['1'] },
      { id:'3', name:'Parent', x:190, y:180, parents:['1','2'] },
      { id:'4', name:'Child', x:190, y:310, parents:['3'] }
    ];
  }

  function renderTree() {
    const layer = el('nodes-layer');
    layer.innerHTML = '';

    members.forEach(m => {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.left = m.x + 'px';
      div.style.top = m.y + 'px';
      div.innerText = m.name;
      div.onclick = () => onNodeClick(m.id);
      layer.appendChild(div);
    });
  }

  function findPath(startId, endId) {
    const queue = [[startId]];
    const visited = new Set([startId]);

    while (queue.length) {
      const path = queue.shift();
      const current = path[path.length - 1];

      if (current === endId) return path;

      const member = members.find(m => m.id === current);
      if (!member) continue;

      let neighbors = [
        ...(member.parents || []),
        ...(member.partners || []),
        ...members.filter(m => m.parents?.includes(current)).map(m => m.id)
      ];

      for (const n of neighbors) {
        if (!visited.has(n)) {
          visited.add(n);
          queue.push([...path, n]);
        }
      }
    }

    return null;
  }

  function initPathMode() {
    isPathMode = !isPathMode;
    pathSelection = [];
    document.querySelectorAll('.card').forEach(c => c.classList.remove('path-highlight'));
    toast(isPathMode ? "Select two members" : "Path mode off");
  }

  function onNodeClick(id) {
    if (!isPathMode) return;

    pathSelection.push(id);

    if (pathSelection.length === 2) {
      const path = findPath(pathSelection[0], pathSelection[1]);

      if (path) {
        path.forEach(pid => {
          const member = members.find(m => m.id === pid);
          document.querySelectorAll('.card').forEach(card => {
            if (card.innerText === member.name)
              card.classList.add('path-highlight');
          });
        });
        toast("Connection: " + (path.length - 1) + " steps");
      } else {
        toast("No path found");
      }

      setTimeout(initPathMode, 3000);
    }
  }

  function shareFamily() {
    const data = {
      title:'Parampara',
      text:'Join our family tree',
      url:window.location.href
    };

    if (navigator.share) {
      navigator.share(data);
    } else {
      navigator.clipboard.writeText(data.url);
      toast("Link copied");
    }
  }

  function toast(msg) {
    const t = el('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function initApp() {
    el('s-lang').classList.add('hide');
    el('app').classList.add('show');
    members = getDemoData();
    renderTree();
  }
</script>

</body>
</html>
